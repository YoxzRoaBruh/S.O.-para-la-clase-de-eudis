<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Monitor del Kernel</title>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background-color: #1e1e1e; 
      color: white; 
      padding: 20px; 
    }
    .tarjeta { 
      background: #2d2d2d; 
      padding: 15px; 
      border-radius: 8px; 
      margin-bottom: 10px; 
      border-left: 4px solid #4CAF50;
    }
    .valor { 
      color: #4CAF50; 
      font-size: 1.2em; 
      font-weight: bold; 
    }
  </style>
</head>
<body>
  <h1>⚡ Dashboard del Sistema</h1>
  
  <div class="tarjeta">
    <h2>🖥️ Procesador</h2>
    <p>Carga actual: <span id="cpu-uso" class="valor">Calculando...</span></p>
  </div>

  <div class="tarjeta">
    <h2>🧠 Memoria RAM</h2>
    <p>Uso actual: <span id="ram-uso" class="valor">Calculando...</span> (Total: <span id="ram-total"></span>)</p>
  </div>

  <script src="index.js"></script>
</body>
</html>
